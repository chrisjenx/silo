ktor {
    deployment {
        port = 8080
        port = ${?SILO_PORT}
        host = "0.0.0.0"
        host = ${?SILO_HOST}
    }
    application {
        modules = [ com.chrisjenx.silo.server.ApplicationKt.module ]
    }
}

silo {
    server {
        port = 8080
        port = ${?SILO_PORT}
        host = "0.0.0.0"
        host = ${?SILO_HOST}
    }
    storage {
        root = "/data"
        root = ${?SILO_STORAGE_ROOT}
        # Total cache size cap (bytes). LRU-evicts oldest by last_access.
        max-bytes = 107374182400
        max-bytes = ${?SILO_MAX_BYTES}
        # Total entry-count cap (inode-exhaustion guard).
        max-entries = 1000000
        max-entries = ${?SILO_MAX_ENTRIES}
        max-entry-bytes = 2147483648
        max-entry-bytes = ${?SILO_MAX_ENTRY_BYTES}
        # Stop accepting PUTs (503) once free space/inodes fall below these.
        reserved-free-bytes = 5368709120
        reserved-free-bytes = ${?SILO_RESERVED_FREE_BYTES}
        reserved-free-inodes = 100000
        reserved-free-inodes = ${?SILO_RESERVED_FREE_INODES}
        allow-unsupported-fs = false
        allow-unsupported-fs = ${?SILO_ALLOW_UNSUPPORTED_FS}
        verify-sha256-on-read = false
        verify-sha256-on-read = ${?SILO_VERIFY_SHA256_ON_READ}
    }
    eviction {
        # TTL: drop entries untouched for this many days (0 disables).
        max-age-days = 30
        max-age-days = ${?SILO_MAX_AGE_DAYS}
        # Throttle to avoid I/O storms on large sweeps.
        max-deletes-per-cycle = 1000
        max-deletes-per-cycle = ${?SILO_MAX_DELETES_PER_CYCLE}
        # Background sweeper cadence (seconds).
        sweep-interval-seconds = 60
        sweep-interval-seconds = ${?SILO_EVICTION_SWEEP_INTERVAL_SECONDS}
    }
    sqlite {
        # Periodic WAL checkpoint (TRUNCATE) keeps the -wal file from growing
        # unbounded; occasional VACUUM reclaims pages after large evictions.
        checkpoint-interval-seconds = 300
        checkpoint-interval-seconds = ${?SILO_SQLITE_CHECKPOINT_INTERVAL_SECONDS}
        vacuum-interval-seconds = 86400
        vacuum-interval-seconds = ${?SILO_SQLITE_VACUUM_INTERVAL_SECONDS}
    }
    auth {
        # When true, GET/HEAD work without credentials. PUT always needs write.
        anonymous-read = true
        anonymous-read = ${?SILO_ANONYMOUS_READ}
        # Path to the bcrypt users file (see docs/configuration.md). Unset =
        # no Basic users; combine with anonymous-read=false to lock the cache.
        users-file = ${?SILO_USERS_FILE}
        oidc {
            # OAuth2 resource-server (Bearer) mode. Coexists with Basic.
            enabled = false
            enabled = ${?SILO_OIDC_ENABLED}
            issuer = ${?SILO_OIDC_ISSUER}
            jwks-url = ${?SILO_OIDC_JWKS_URL}
            audience = ${?SILO_OIDC_AUDIENCE}
            roles-claim = "roles"
            roles-claim = ${?SILO_OIDC_ROLES_CLAIM}
            read-roles = []
            write-roles = []
        }
    }
    audit {
        # Append-only JSONL audit log of admin-API mutations, rotated daily
        # (audit-<UTC-date>.jsonl under `dir`).
        enabled = false
        enabled = ${?SILO_AUDIT_ENABLED}
        dir = "/data/audit"
        dir = ${?SILO_AUDIT_DIR}
    }
}
