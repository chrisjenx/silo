<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>silo — dashboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="/admin/silo-tokens.css" />
    <script src="/admin/silo-tokens.js" defer></script>
    <style>
      html, body { margin: 0; }
      body {
        font-family: ui-monospace, "JetBrains Mono", "Menlo", monospace;
        font-size: 14px;
        line-height: 1.4;
        padding: 1.5rem;
      }
      h1 { margin: 0 0 1rem; font-weight: 600; }
      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(18ch, 1fr));
        gap: 1rem;
        margin-bottom: 1.5rem;
      }
      .tile {
        border: 1px solid var(--silo-border);
        padding: 1rem;
      }
      .tile .label {
        color: var(--silo-dim);
        text-transform: lowercase;
        font-size: 12px;
      }
      .tile .value {
        font-size: 28px;
        margin-top: 0.25rem;
      }
      .sparkline {
        font-size: 24px;
        letter-spacing: 0.1ch;
        color: var(--silo-accent);
      }
      .meta { color: var(--silo-dim); font-size: 12px; }
      a { color: var(--silo-fg); }
    </style>
  </head>
  <body>
    <h1>silo · dashboard</h1>
    <p class="meta">
      <span id="root"></span> · <span id="fs"></span> ·
      <a href="/admin/">home</a>
    </p>
    <div class="grid">
      <div class="tile"><div class="label">entries</div><div class="value" id="entries">—</div></div>
      <div class="tile"><div class="label">bytes</div><div class="value" id="bytes">—</div></div>
      <div class="tile"><div class="label">hits</div><div class="value" id="hits">—</div></div>
      <div class="tile"><div class="label">misses</div><div class="value" id="misses">—</div></div>
      <div class="tile"><div class="label">puts</div><div class="value" id="puts">—</div></div>
      <div class="tile"><div class="label">evictions</div><div class="value" id="evictions">—</div></div>
    </div>
    <div class="tile">
      <div class="label">hit rate · last 12 samples</div>
      <div class="sparkline" id="spark">▁▁▁▁▁▁▁▁▁▁▁▁</div>
      <div class="meta" id="hitRate">hit rate: —</div>
    </div>

    <script>
      const BLOCKS = ["▁","▂","▃","▄","▅","▆","▇","█"];
      const history = [];

      function fmtBytes(n) {
        if (n == null) return "—";
        const units = ["B","KiB","MiB","GiB","TiB"];
        let u = 0; let v = n;
        while (v >= 1024 && u < units.length - 1) { v /= 1024; u += 1; }
        return v.toFixed(v >= 100 ? 0 : v >= 10 ? 1 : 2) + " " + units[u];
      }

      async function refresh() {
        try {
          const [statsR, storageR] = await Promise.all([
            fetch("/api/stats"), fetch("/api/storage"),
          ]);
          const stats = await statsR.json();
          const storage = await storageR.json();
          document.getElementById("entries").textContent = stats.entryCount;
          document.getElementById("bytes").textContent = fmtBytes(stats.bytesStored);
          document.getElementById("hits").textContent = stats.hits;
          document.getElementById("misses").textContent = stats.misses;
          document.getElementById("puts").textContent = stats.puts;
          document.getElementById("evictions").textContent = stats.evictions;
          document.getElementById("hitRate").textContent =
            "hit rate: " + (stats.hitRate * 100).toFixed(1) + "%";
          document.getElementById("root").textContent = storage.root;
          document.getElementById("fs").textContent = storage.fsType;
          history.push(stats.hitRate);
          if (history.length > 12) history.shift();
          document.getElementById("spark").textContent = history
            .map(r => BLOCKS[Math.min(7, Math.floor(r * 8))])
            .join("");
        } catch (e) {
          document.getElementById("hitRate").textContent = "stats fetch failed: " + e.message;
        }
      }
      refresh();
      setInterval(refresh, 5_000);
    </script>
  </body>
</html>
