name: Bug report
description: Something works differently than documented or expected.
labels: ["type/bug"]
body:
  - type: input
    id: version
    attributes:
      label: Silo version
      placeholder: "v0.1.0 or commit SHA"
    validations:
      required: true
  - type: input
    id: jvm
    attributes:
      label: JVM version
      placeholder: "openjdk 21.0.4"
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: OS / architecture
      placeholder: "Ubuntu 24.04 LTS / linux-amd64"
    validations:
      required: true
  - type: dropdown
    id: deployment
    attributes:
      label: How is Silo deployed?
      options:
        - Docker (ghcr.io image)
        - Docker (locally built)
        - Fat jar (java -jar silo.jar)
        - Built from source
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Reproduction steps
      description: Minimal sequence of commands or actions that triggers the bug.
      placeholder: |
        1. Start Silo with SILO_MAX_BYTES=1G
        2. PUT 10 entries of 200MB each
        3. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Paste structured JSON log lines. Redact secrets and bodies.
      render: text
  - type: textarea
    id: extra
    attributes:
      label: Anything else?
      placeholder: Storage backend, mount type, reverse proxy, unusual config, etc.
