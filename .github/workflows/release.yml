name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write
  packages: write
  id-token: write
  attestations: write

jobs:
  release:
    name: Build, sign, publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Build full + slim jars
        # full (:server-update) includes `silo update`; slim (:server) has no
        # self-updater — shipped for locked-down/security-sensitive deploys.
        run: ./gradlew --no-daemon :server-update:shadowJar :server:shadowJar -Psilo.commit="${GITHUB_SHA:0:7}"

      - name: Generate SBOMs (CycloneDX)
        run: ./gradlew --no-daemon :server-update:cyclonedxBom :server:cyclonedxBom

      - name: Stage artifacts + compute checksums
        run: |
          mkdir -p dist
          # The full jar is the canonical `silo.jar` asset (the name `silo update`
          # and the README quickstart depend on); the slim jar ships alongside it.
          cp modules/server-update/build/libs/silo-*-all.jar dist/silo.jar
          cp modules/server/build/libs/silo-*-slim.jar dist/silo-slim.jar
          cp modules/server-update/build/reports/bom.json dist/silo-sbom.cdx.json
          cp modules/server/build/reports/bom.json dist/silo-slim-sbom.cdx.json
          (cd dist && sha256sum silo.jar silo-slim.jar silo-sbom.cdx.json silo-slim-sbom.cdx.json > checksums.txt)

      # Publish both CycloneDX SBOMs to a Dependency-Track instance for
      # continuous vulnerability tracking — the full jar as project `silo` and
      # the slim jar as `silo-slim`, so its reduced dependency surface is tracked
      # separately. No-ops unless DEPENDENCYTRACK_URL is configured as a repo/org
      # secret, so forks and unconfigured repos skip it.
      - name: Publish SBOMs to Dependency-Track
        env:
          DT_URL: ${{ secrets.DEPENDENCYTRACK_URL }}
          DT_API_KEY: ${{ secrets.DEPENDENCYTRACK_API_KEY }}
        run: |
          if [ -z "$DT_URL" ]; then
            echo "DEPENDENCYTRACK_URL not set — skipping SBOM publish."
            exit 0
          fi
          version="${GITHUB_REF_NAME#v}"
          for proj in "silo:dist/silo-sbom.cdx.json" "silo-slim:dist/silo-slim-sbom.cdx.json"; do
            name="${proj%%:*}"; bom="${proj#*:}"
            curl -fsS -X POST "${DT_URL%/}/api/v1/bom" \
              -H "X-Api-Key: $DT_API_KEY" \
              -F "autoCreate=true" \
              -F "projectName=$name" \
              -F "projectVersion=$version" \
              -F "bom=@$bom"
          done

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to ghcr.io
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository_owner }}/silo
          tags: |
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}
          labels: |
            org.opencontainers.image.version=${{ github.ref_name }}

      - name: Build + push multi-arch image
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          provenance: true
          sbom: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Install cosign
        # cosign-installer publishes only exact-version tags (no moving v4),
        # so the major-only @v4 fails to resolve at job setup. Pin the version.
        uses: sigstore/cosign-installer@v4.1.2

      - name: Sign image (keyless)
        env:
          COSIGN_EXPERIMENTAL: "1"
          DIGEST: ${{ steps.build.outputs.digest }}
          # metadata-action emits a NEWLINE-separated tag list. Pass it through
          # the environment and iterate line-by-line — interpolating it straight
          # into `for tag in ...` splits on the newlines and breaks the shell.
          TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          printf '%s\n' "$TAGS" | while IFS= read -r tag; do
            [ -n "$tag" ] || continue
            cosign sign --yes "${tag}@${DIGEST}"
          done

      - name: Attest provenance for the jars
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: |
            dist/silo.jar
            dist/silo-slim.jar

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            dist/silo.jar
            dist/silo-slim.jar
            dist/silo-sbom.cdx.json
            dist/silo-slim-sbom.cdx.json
            dist/checksums.txt
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
