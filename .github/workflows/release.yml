name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write
  packages: write
  id-token: write
  attestations: write

jobs:
  release:
    name: Build, sign, publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Build fat jar
        run: ./gradlew --no-daemon :server:shadowJar -Psilo.commit="${GITHUB_SHA:0:7}"

      - name: Generate SBOM (CycloneDX)
        run: ./gradlew --no-daemon :server:cyclonedxBom

      - name: Compute checksums
        run: |
          mkdir -p dist
          cp modules/server/build/libs/silo-*-all.jar dist/silo.jar
          cp modules/server/build/reports/bom.json dist/silo-sbom.cdx.json
          (cd dist && sha256sum silo.jar silo-sbom.cdx.json > checksums.txt)

      # Publish the CycloneDX SBOM to a Dependency-Track instance for
      # continuous vulnerability tracking. No-ops unless DEPENDENCYTRACK_URL is
      # configured as a repo/org secret, so forks and unconfigured repos skip it.
      - name: Publish SBOM to Dependency-Track
        env:
          DT_URL: ${{ secrets.DEPENDENCYTRACK_URL }}
          DT_API_KEY: ${{ secrets.DEPENDENCYTRACK_API_KEY }}
        run: |
          if [ -z "$DT_URL" ]; then
            echo "DEPENDENCYTRACK_URL not set — skipping SBOM publish."
            exit 0
          fi
          version="${GITHUB_REF_NAME#v}"
          curl -fsS -X POST "${DT_URL%/}/api/v1/bom" \
            -H "X-Api-Key: $DT_API_KEY" \
            -F "autoCreate=true" \
            -F "projectName=silo" \
            -F "projectVersion=$version" \
            -F "bom=@dist/silo-sbom.cdx.json"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to ghcr.io
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository_owner }}/silo
          tags: |
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}
          labels: |
            org.opencontainers.image.version=${{ github.ref_name }}

      - name: Build + push multi-arch image
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          provenance: true
          sbom: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Install cosign
        # cosign-installer publishes only exact-version tags (no moving v4),
        # so the major-only @v4 fails to resolve at job setup. Pin the version.
        uses: sigstore/cosign-installer@v4.1.2

      - name: Sign image (keyless)
        env:
          COSIGN_EXPERIMENTAL: "1"
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          for tag in ${{ steps.meta.outputs.tags }}; do
            cosign sign --yes "${tag}@${DIGEST}"
          done

      - name: Attest provenance for the jar
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: dist/silo.jar

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            dist/silo.jar
            dist/silo-sbom.cdx.json
            dist/checksums.txt
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
