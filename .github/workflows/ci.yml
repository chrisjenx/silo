name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  build:
    name: build / ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Bootstrap check (no Gradle yet)
        run: |
          if [ ! -f gradlew ]; then
            echo "Gradle build not yet scaffolded — issue #1 still open. Skipping build step."
            exit 0
          fi
          echo "scaffold=true" >> "$GITHUB_ENV"

      - name: Build + test + lint + coverage
        if: env.scaffold == 'true'
        run: ./gradlew --no-daemon --stacktrace build koverXmlReport ktlintCheck detekt

      - name: Publish JUnit annotations
        if: always() && env.scaffold == 'true'
        uses: mikepenz/action-junit-report@v4
        with:
          report_paths: '**/build/test-results/**/*.xml'

      - name: Upload coverage
        if: env.scaffold == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.os }}
          path: '**/build/reports/kover/'
          if-no-files-found: ignore

  markdown:
    name: docs lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Lint markdown
        run: npx --yes markdownlint-cli2 "**/*.md" "#node_modules" "#build"

  link-check:
    name: link check (docs)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: lycheeverse/lychee-action@v2.0.2
        with:
          args: --no-progress --offline --include-fragments "**/*.md"
          fail: true
