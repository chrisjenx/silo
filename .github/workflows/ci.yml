name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  build:
    name: build / ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Build + test + lint + coverage
        run: ./gradlew --no-daemon --stacktrace build koverXmlReport ktlintCheck detekt spotlessCheck

      - name: Verify the slim jar excludes the self-updater
        run: |
          ./gradlew --no-daemon :server:shadowJar :server-update:shadowJar -Psilo.commit="${GITHUB_SHA:0:7}"
          slim=$(ls modules/server/build/libs/silo-*-slim.jar)
          full=$(ls modules/server-update/build/libs/silo-*-all.jar)
          echo "slim=$slim ($(du -h "$slim" | cut -f1))  full=$full ($(du -h "$full" | cut -f1))"
          if unzip -l "$slim" | grep -qE 'com/chrisjenx/silo/updater/|dev/sigstore/|io/grpc/'; then
            echo "::error::slim jar unexpectedly bundles the updater/sigstore"; exit 1
          fi
          if ! unzip -l "$full" | grep -q 'com/chrisjenx/silo/updater/'; then
            echo "::error::full jar is missing the updater"; exit 1
          fi
          echo "Jar split verified: slim excludes the updater, full includes it."

      - name: Publish JUnit annotations
        if: always()
        uses: mikepenz/action-junit-report@v6
        with:
          report_paths: '**/build/test-results/**/*.xml'

      - name: Upload kover XML reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: kover-xml-${{ matrix.os }}
          path: '**/build/reports/kover/report.xml'
          if-no-files-found: ignore

      - name: Upload kover HTML reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: kover-html-${{ matrix.os }}
          path: '**/build/reports/kover/html/'
          if-no-files-found: ignore

      - name: Upload detekt reports
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: detekt-${{ matrix.os }}
          path: '**/build/reports/detekt/'
          if-no-files-found: ignore

  docker:
    name: docker build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v4

      # amd64 only here (native, no emulation) to keep PRs fast — this proves
      # the Dockerfile + in-container Gradle build are sound. The full
      # linux/amd64,linux/arm64 matrix is built and pushed by release.yml.
      - name: Build image (amd64, no push)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64
          push: false
          build-args: |
            VERSION=ci-${{ github.sha }}
            VCS_REF=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  smoke:
    name: k6 smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Build fat jar
        run: ./gradlew --no-daemon --stacktrace :server:shadowJar -x test

      - name: Install k6
        run: |
          set -euo pipefail
          K6_VERSION=v0.52.0
          curl -fsSL "https://github.com/grafana/k6/releases/download/${K6_VERSION}/k6-${K6_VERSION}-linux-amd64.tar.gz" \
            | tar -xz
          sudo install "k6-${K6_VERSION}-linux-amd64/k6" /usr/local/bin/k6
          k6 version

      - name: Boot silo and run k6 smoke
        run: |
          set -euo pipefail
          # tmpfs data root so the smoke never touches the runner's disk.
          DATA="$(mktemp -d -p /dev/shm)"
          # A throwaway WRITE user for the smoke's PUTs (PUT always needs WRITE).
          # bcrypt hash of "silo-ci-secret"; this is an ephemeral CI credential.
          cat > ci-users.conf <<'USERS'
          silo {
            users = [
              {
                username = "ci"
                password-hash = "$2a$10$y3XGw7R720reVhD91l/yYuJbMcIBd4NsFhYPErAUy91jC3P14Si3W"
                roles = ["read", "write"]
              }
            ]
          }
          USERS
          JAR="$(ls modules/server/build/libs/silo-*-slim.jar | head -1)"
          # Disable the free-space/inode reserve on the small /dev/shm tmpfs so
          # the default 5 GB / 100k reserve doesn't reject CI PUTs. Production
          # keeps the documented defaults.
          SILO_PORT=8080 SILO_STORAGE_ROOT="$DATA" \
            java -Dsilo.auth.users-file="$PWD/ci-users.conf" \
              -Dsilo.storage.reserved-free-bytes=0 \
              -Dsilo.storage.reserved-free-inodes=0 \
              -jar "$JAR" &
          SILO_PID=$!
          trap 'kill "$SILO_PID" 2>/dev/null || true' EXIT

          # Wait for readiness (up to ~30s).
          for _ in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:8080/health >/dev/null 2>&1; then break; fi
            sleep 1
          done
          curl -fsS http://127.0.0.1:8080/health

          k6 run \
            -e BASE_URL=http://127.0.0.1:8080 \
            -e AUTH='ci:silo-ci-secret' \
            bench/k6/smoke.js

  gradle-cache-e2e:
    name: gradle cache e2e
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Build fat jar
        run: ./gradlew --no-daemon --stacktrace :server:shadowJar -x test

      - name: Boot silo and run the Gradle build-cache e2e
        run: |
          set -euo pipefail
          DATA="$(mktemp -d -p /dev/shm)"
          # Same throwaway WRITE user as the k6 smoke job (bcrypt of "silo-ci-secret").
          cat > ci-users.conf <<'USERS'
          silo {
            users = [
              {
                username = "ci"
                password-hash = "$2a$10$y3XGw7R720reVhD91l/yYuJbMcIBd4NsFhYPErAUy91jC3P14Si3W"
                roles = ["read", "write"]
              }
            ]
          }
          USERS
          JAR="$(ls modules/server/build/libs/silo-*-slim.jar | head -1)"
          # Disable the free-space/inode reserve on the small /dev/shm tmpfs so
          # the default 5 GB / 100k reserve doesn't reject CI PUTs. Production
          # keeps the documented defaults.
          SILO_PORT=8080 SILO_STORAGE_ROOT="$DATA" \
            java -Dsilo.auth.users-file="$PWD/ci-users.conf" \
              -Dsilo.storage.reserved-free-bytes=0 \
              -Dsilo.storage.reserved-free-inodes=0 \
              -jar "$JAR" &
          SILO_PID=$!
          trap 'kill "$SILO_PID" 2>/dev/null || true' EXIT

          for _ in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:8080/health >/dev/null 2>&1; then break; fi
            sleep 1
          done
          curl -fsS http://127.0.0.1:8080/health

          SILO_CACHE_USER=ci SILO_CACHE_PASSWORD=silo-ci-secret \
            bash e2e/gradle-cache/run.sh

  markdown:
    name: docs lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - name: Lint markdown
        # CHANGELOG.md is generated by release-please (never hand-edited) and
        # its formatting isn't lint-clean (MD012), so exclude it from the gate.
        run: npx --yes markdownlint-cli2 "**/*.md" "#node_modules" "#build" "#CHANGELOG.md"

  link-check:
    name: link check (docs)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: lycheeverse/lychee-action@v2
        with:
          args: --no-progress --offline --include-fragments "**/*.md"
          fail: true
