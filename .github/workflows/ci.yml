name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  build:
    name: build / ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Build + test + lint + coverage
        run: ./gradlew --no-daemon --stacktrace build koverXmlReport ktlintCheck detekt spotlessCheck

      - name: Publish JUnit annotations
        if: always()
        uses: mikepenz/action-junit-report@v6
        with:
          report_paths: '**/build/test-results/**/*.xml'

      - name: Upload kover XML reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: kover-xml-${{ matrix.os }}
          path: '**/build/reports/kover/report.xml'
          if-no-files-found: ignore

      - name: Upload kover HTML reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: kover-html-${{ matrix.os }}
          path: '**/build/reports/kover/html/'
          if-no-files-found: ignore

      - name: Upload detekt reports
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: detekt-${{ matrix.os }}
          path: '**/build/reports/detekt/'
          if-no-files-found: ignore

  markdown:
    name: docs lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - name: Lint markdown
        run: npx --yes markdownlint-cli2 "**/*.md" "#node_modules" "#build"

  link-check:
    name: link check (docs)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: lycheeverse/lychee-action@v2
        with:
          args: --no-progress --offline --include-fragments "**/*.md"
          fail: true
