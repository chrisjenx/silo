name: Bench

# k6 latency regression gate, comparing the PR against its merge base (main)
# by building and benchmarking BOTH jars on the SAME runner, back-to-back.
# This is immune to cross-run GitHub-runner variance, so there is no cached
# baseline to drift or get stuck (the previous design froze on one lucky-fast
# run and then failed every run, main and PRs alike).
on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: bench-${{ github.ref }}
  cancel-in-progress: true

jobs:
  k6:
    name: k6 regression gate (PR vs main, same runner)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Install k6
        run: |
          set -euo pipefail
          K6_VERSION=v0.52.0
          curl -fsSL "https://github.com/grafana/k6/releases/download/${K6_VERSION}/k6-${K6_VERSION}-linux-amd64.tar.gz" \
            | tar -xz
          sudo install "k6-${K6_VERSION}-linux-amd64/k6" /usr/local/bin/k6
          k6 version

      # Build the PR's server jar and — on a PR — the base (main) jar too, both
      # on this same runner. Classifier-agnostic glob: works for silo-*-all.jar
      # and (post #145) silo-*-slim.jar.
      - name: Build current + base server jars
        run: |
          set -euo pipefail
          HEAD_SHA="$(git rev-parse HEAD)"
          ./gradlew --no-daemon --stacktrace :server:shadowJar
          cp "$(ls modules/server/build/libs/silo-*.jar | head -1)" /tmp/current.jar
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
            echo "Building base (main) jar @ ${BASE_SHA:0:7}"
            git checkout --quiet "$BASE_SHA"
            ./gradlew --no-daemon --stacktrace :server:shadowJar
            cp "$(ls modules/server/build/libs/silo-*.jar | head -1)" /tmp/base.jar
            git checkout --quiet "$HEAD_SHA"
          fi

      # Benchmark base then current, same runner, fresh /dev/shm root each time.
      - name: Benchmark (base then current)
        env:
          DURATION: 1m
        run: |
          set -euo pipefail
          if [ -f /tmp/base.jar ]; then
            bash bench/run-k6.sh /tmp/base.jar base-results.json "$DURATION"
          fi
          bash bench/run-k6.sh /tmp/current.jar current-results.json "$DURATION"

      - name: Compare PR vs main
        id: gate
        if: github.event_name == 'pull_request'
        continue-on-error: true
        run: |
          ./gradlew --no-daemon :bench:compareBaseline \
            -Pcurrent=current-results.json \
            -Pbaseline=base-results.json \
            -Pthreshold=0.10 \
            -Psummary=bench-summary.md

      - name: Comment results on PR
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const marker = '<!-- bench-gate -->';
            let summary = '_No bench summary was produced._';
            try { summary = fs.readFileSync('bench-summary.md', 'utf8'); } catch (e) {}
            const body = `${marker}\n${summary}`;
            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const { data: comments } = await github.rest.issues.listComments({ owner, repo, issue_number });
            const existing = comments.find((c) => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body });
            }

      - name: Enforce regression gate
        if: steps.gate.outcome == 'failure'
        run: |
          echo "::error::k6 latency regressed >10% vs main on the same runner (see the PR comment)."
          exit 1
