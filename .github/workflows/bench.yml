name: Bench

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    # Nightly at 03:00 UTC — refreshes the baseline on main.
    - cron: "0 3 * * *"
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: bench-${{ github.ref }}
  cancel-in-progress: true

jobs:
  k6:
    name: k6 regression gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Build fat jar
        run: ./gradlew --no-daemon --stacktrace :server:shadowJar

      - name: Install k6
        run: |
          set -euo pipefail
          K6_VERSION=v0.52.0
          curl -fsSL "https://github.com/grafana/k6/releases/download/${K6_VERSION}/k6-${K6_VERSION}-linux-amd64.tar.gz" \
            | tar -xz
          sudo install "k6-${K6_VERSION}-linux-amd64/k6" /usr/local/bin/k6
          k6 version

      # Baseline lives in the Actions cache (main is protected, so the workflow
      # can't push a committed file to it). main/nightly runs save a new entry;
      # PRs restore the latest via the restore-keys prefix.
      - name: Restore baseline
        uses: actions/cache/restore@v4
        with:
          path: bench/baselines/main.json
          key: bench-baseline-main-${{ github.run_id }}
          restore-keys: |
            bench-baseline-main-

      - name: Boot Silo
        run: |
          set -euo pipefail
          DATA="$(mktemp -d -p /dev/shm)"
          # Throwaway WRITE user so the mixed workload's PUTs are authorized.
          cat > ci-users.conf <<'USERS'
          silo {
            users = [
              {
                username = "ci"
                password-hash = "$2a$10$y3XGw7R720reVhD91l/yYuJbMcIBd4NsFhYPErAUy91jC3P14Si3W"
                roles = ["read", "write"]
              }
            ]
          }
          USERS
          JAR="$(ls modules/server/build/libs/silo-*-all.jar | head -1)"
          # Disable the free-space/inode reserve: the bench runs on a small
          # /dev/shm tmpfs and the default 5 GB / 100k reserve would reject the
          # workload's PUTs. Production keeps the documented defaults.
          SILO_PORT=8080 SILO_STORAGE_ROOT="$DATA" \
            java -Dsilo.auth.users-file="$PWD/ci-users.conf" \
              -Dsilo.storage.reserved-free-bytes=0 \
              -Dsilo.storage.reserved-free-inodes=0 \
              -jar "$JAR" &
          echo $! > silo.pid
          for _ in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:8080/health >/dev/null 2>&1; then break; fi
            sleep 1
          done
          curl -fsS http://127.0.0.1:8080/health

      - name: Run mixed workload
        env:
          # PRs run a short workload to stay cheap; main/nightly run the full 5m.
          DURATION: ${{ github.event_name == 'pull_request' && '1m' || '5m' }}
        run: |
          set -euo pipefail
          # Three runs against the already-booted Silo; the gate compares the
          # per-percentile MEDIAN so one noisy run on a shared runner doesn't
          # trip the 10% threshold.
          for i in 1 2 3; do
            k6 run --summary-export="run${i}.json" \
              -e BASE_URL=http://127.0.0.1:8080 \
              -e AUTH='ci:silo-ci-secret' \
              -e DURATION="$DURATION" \
              bench/k6/mixed.js
          done
          median() {
            jq -s --arg k "$1" '[.[].metrics.http_req_duration[$k]] | sort | .[1]' run1.json run2.json run3.json
          }
          med="$(median med)"
          p95="$(median 'p(95)')"
          p99="$(median 'p(99)')"
          printf '{"metrics":{"http_req_duration":{"med":%s,"p(95)":%s,"p(99)":%s}}}\n' \
            "$med" "$p95" "$p99" > bench-results.json
          echo "median-of-3 → med=$med p95=$p95 p99=$p99"

      - name: Stop Silo
        if: always()
        run: kill "$(cat silo.pid)" 2>/dev/null || true

      - name: Compare vs baseline
        id: gate
        continue-on-error: true
        run: |
          ./gradlew --no-daemon :bench:compareBaseline \
            -Pcurrent=bench-results.json \
            -Pbaseline=bench/baselines/main.json \
            -Pthreshold=0.10 \
            -Psummary=bench-summary.md

      - name: Comment results on PR
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const marker = '<!-- bench-gate -->';
            let summary = '_No bench summary was produced._';
            try { summary = fs.readFileSync('bench-summary.md', 'utf8'); } catch (e) {}
            const body = `${marker}\n${summary}`;
            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const { data: comments } = await github.rest.issues.listComments({ owner, repo, issue_number });
            const existing = comments.find((c) => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body });
            }

      - name: Refresh baseline (main only)
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main' && steps.gate.outcome == 'success'
        run: |
          mkdir -p bench/baselines
          cp bench-results.json bench/baselines/main.json

      - name: Save baseline (main only)
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main' && steps.gate.outcome == 'success'
        uses: actions/cache/save@v4
        with:
          path: bench/baselines/main.json
          key: bench-baseline-main-${{ github.run_id }}

      - name: Enforce regression gate
        if: steps.gate.outcome == 'failure'
        run: |
          echo "::error::k6 latency regression exceeded the 10% threshold (see the PR comment)."
          exit 1
