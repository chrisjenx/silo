name: Bench

on:
  schedule:
    # Nightly at 03:00 UTC
    - cron: "0 3 * * *"
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  k6:
    name: k6 regression gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Bootstrap check
        run: |
          if [ ! -d bench/k6 ]; then
            echo "k6 scripts not yet scaffolded — issue #20 still open. Skipping."
            exit 0
          fi
          echo "scaffolded=true" >> "$GITHUB_ENV"

      - name: Build fat jar
        if: env.scaffolded == 'true'
        run: ./gradlew --no-daemon :server:shadowJar

      - name: Boot Silo
        if: env.scaffolded == 'true'
        run: |
          mkdir -p /tmp/silo-data
          java -jar modules/server/build/libs/silo-*-all.jar &
          echo $! > /tmp/silo.pid
          for i in $(seq 1 30); do
            curl -fsS http://localhost:8080/health && break || sleep 1
          done
        env:
          SILO_STORAGE_ROOT: /tmp/silo-data
          SILO_PORT: "8080"

      - name: Install k6
        if: env.scaffolded == 'true'
        run: |
          curl -sSL https://github.com/grafana/k6/releases/latest/download/k6-linux-amd64.tar.gz | tar xz
          sudo mv k6-*/k6 /usr/local/bin/k6

      - name: Run mixed workload (5m)
        if: env.scaffolded == 'true'
        run: k6 run --summary-export=bench-results.json bench/k6/mixed.js

      - name: Restore baseline
        if: env.scaffolded == 'true'
        uses: actions/cache@v5
        with:
          path: bench/baselines/main.json
          key: bench-baseline-${{ github.ref_name }}
          restore-keys: |
            bench-baseline-

      - name: Compare vs baseline
        if: env.scaffolded == 'true'
        run: ./gradlew --no-daemon :bench:compareBaseline -Pcurrent=bench-results.json -Pbaseline=bench/baselines/main.json -Pthreshold=0.10

      - name: Save new baseline on main
        if: env.scaffolded == 'true' && github.ref == 'refs/heads/main' && success()
        run: |
          mkdir -p bench/baselines
          cp bench-results.json bench/baselines/main.json

      - name: Stop Silo
        if: always() && env.scaffolded == 'true'
        run: kill $(cat /tmp/silo.pid) || true

      - name: Post results comment
        if: env.scaffolded == 'true' && github.event_name == 'push'
        uses: peter-evans/commit-comment@v4
        with:
          body-path: bench-summary.md
