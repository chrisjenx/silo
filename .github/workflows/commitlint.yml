name: Commitlint

on:
  pull_request:
    types: [opened, edited, reopened, synchronize]

permissions:
  pull-requests: read

jobs:
  pr-title:
    name: PR title — Conventional Commits
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            perf
            refactor
            docs
            test
            chore
            build
            ci
          requireScope: false
          subjectPattern: ^(?![A-Z]).{1,72}$
          subjectPatternError: |
            PR title subject must start with a lowercase letter and be 1–72 characters
            (Conventional Commits). Move detail to the PR description.
          validateSingleCommit: false
