<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>silo — dashboard (demo)</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" href="favicon.svg" />
    <!--
      Demo copy of modules/server/src/main/resources/static/admin/dashboard.html.
      Only paths are relative and demo-mock.js is loaded first so window.fetch
      returns simulated data. Keep the body in sync with the real page.
    -->
    <link rel="stylesheet" href="silo-tokens.css" />
    <script src="demo-mock.js"></script>
    <script src="silo-tokens.js" defer></script>
    <style>
      html, body { margin: 0; }
      body {
        font-family: ui-monospace, "JetBrains Mono", "Menlo", monospace;
        font-size: 14px;
        line-height: 1.4;
        padding: 1.5rem;
      }
      h1 { margin: 0 0 1rem; font-weight: 600; }
      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(18ch, 1fr));
        gap: 1rem;
        margin-bottom: 1.5rem;
      }
      .tile {
        border: 1px solid var(--silo-border);
        padding: 1rem;
      }
      .tile .label {
        color: var(--silo-dim);
        text-transform: lowercase;
        font-size: 12px;
      }
      .tile .value {
        font-size: 28px;
        margin-top: 0.25rem;
      }
      .sparkline {
        font-size: 24px;
        letter-spacing: 0.1ch;
        color: var(--silo-accent);
      }
      .meta { color: var(--silo-dim); font-size: 12px; }
      a { color: var(--silo-fg); }
      .cfg {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(22ch, 1fr));
        gap: 0.25rem 1.5rem;
        margin-top: 0.5rem;
      }
      .crow { display: flex; justify-content: space-between; gap: 1rem; }
      .crow .ck { color: var(--silo-dim); }
    </style>
  </head>
  <body>
    <h1>silo · dashboard</h1>
    <p class="meta">
      <span id="root"></span> · <span id="fs"></span> ·
      <a href="index.html">home</a>
    </p>
    <div class="grid">
      <div class="tile"><div class="label">entries</div><div class="value" id="entries">—</div></div>
      <div class="tile"><div class="label">bytes</div><div class="value" id="bytes">—</div></div>
      <div class="tile"><div class="label">hits</div><div class="value" id="hits">—</div></div>
      <div class="tile"><div class="label">misses</div><div class="value" id="misses">—</div></div>
      <div class="tile"><div class="label">puts</div><div class="value" id="puts">—</div></div>
      <div class="tile"><div class="label">evictions</div><div class="value" id="evictions">—</div></div>
    </div>
    <div class="tile">
      <div class="label">hit rate · last 12 samples</div>
      <div class="sparkline" id="spark">▁▁▁▁▁▁▁▁▁▁▁▁</div>
      <div class="meta" id="hitRate">hit rate: —</div>
    </div>
    <div class="tile" style="margin-top:1rem;">
      <div class="label">limits · configured caps</div>
      <div class="cfg" id="cfg"><span class="meta">loading…</span></div>
    </div>

    <script>
      const BLOCKS = ["▁","▂","▃","▄","▅","▆","▇","█"];
      const history = [];

      function fmtBytes(n) {
        if (n == null) return "—";
        const units = ["B","KiB","MiB","GiB","TiB"];
        let u = 0; let v = n;
        while (v >= 1024 && u < units.length - 1) { v /= 1024; u += 1; }
        return v.toFixed(v >= 100 ? 0 : v >= 10 ? 1 : 2) + " " + units[u];
      }

      async function refresh() {
        try {
          const [statsR, storageR] = await Promise.all([
            fetch("/api/stats"), fetch("/api/storage"),
          ]);
          const stats = await statsR.json();
          const storage = await storageR.json();
          document.getElementById("entries").textContent = stats.entryCount;
          document.getElementById("bytes").textContent = fmtBytes(stats.bytesStored);
          document.getElementById("hits").textContent = stats.hits;
          document.getElementById("misses").textContent = stats.misses;
          document.getElementById("puts").textContent = stats.puts;
          document.getElementById("evictions").textContent = stats.evictions;
          document.getElementById("hitRate").textContent =
            "hit rate: " + (stats.hitRate * 100).toFixed(1) + "%";
          document.getElementById("root").textContent = storage.root;
          document.getElementById("fs").textContent = storage.fsType;
          history.push(stats.hitRate);
          if (history.length > 12) history.shift();
          document.getElementById("spark").textContent = history
            .map(r => BLOCKS[Math.min(7, Math.floor(r * 8))])
            .join("");
        } catch (e) {
          document.getElementById("hitRate").textContent = "stats fetch failed: " + e.message;
        }
      }
      async function loadConfig() {
        try {
          const c = await (await fetch("/api/config")).json();
          const s = c.storage || {};
          const e = c.eviction || {};
          const num = n => (n == null ? "—" : Number(n).toLocaleString());
          const rows = [
            ["max total size", fmtBytes(s.maxBytes)],
            ["max entry size", fmtBytes(s.maxEntryBytes)],
            ["max entries", num(s.maxEntries)],
            ["reserved free space", fmtBytes(s.reservedFreeBytes)],
            ["reserved free inodes", num(s.reservedFreeInodes)],
            ["max age", e.maxAgeDays == null ? "—" : e.maxAgeDays + " days"],
            ["max deletes / cycle", num(e.maxDeletesPerCycle)],
            ["verify sha-256 on read", s.verifySha256OnRead ? "on" : "off"],
          ];
          document.getElementById("cfg").innerHTML = rows
            .map(([k, v]) =>
              '<div class="crow"><span class="ck">' + k + "</span><span>" + v + "</span></div>")
            .join("");
        } catch (err) {
          document.getElementById("cfg").textContent = "config fetch failed: " + err.message;
        }
      }

      refresh();
      loadConfig();
      setInterval(refresh, 5_000);
    </script>
  </body>
</html>
